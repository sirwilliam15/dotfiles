# Starship Prompt — Everforest + Nord blend
# Place at ~/.config/starship.toml

format = """
[╭─](bold green)\
$hostname\
$directory\
$python\
$nix_shell\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
[╰─](bold green)$character"""

[directory]
style = "bold #a7c080"          # Everforest green
truncation_length = 3
repo_root_style = "bold #83c092"

[git_branch]
symbol = " "
style = "bold #81a1c1"          # Nord Frost blue

[git_status]
style = "bold #e67e80"          # Everforest red

[character]
success_symbol = "[❯](bold #a7c080)"   # Everforest green
error_symbol = "[❯](bold #e67e80)"     # Everforest red

[hostname]
ssh_only = true
style = "bold #8fbcbb"          # Nord Frost 1 (warm accent)
format = "[$hostname]($style) "

[cmd_duration]
min_time = 500
style = "bold #dbbc7f"          # Everforest yellow

[python]
detect_env_vars = ["VIRTUAL_ENV"]
detect_extensions = []
detect_files = []
detect_folders = []
format = '[p](bold #3776ab)[y](bold #ffd43b)[:${virtualenv}]($style) '
style = "bold #7fbbb3"

[nix_shell]
format = '[nix:$name]($style) '
style = "bold #83c092"
